<!DOCTYPE html>
<html>
<head>
<title>ATM Banking Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>ATM Simulator 💳</h2>

<p><strong>Balance: R<span id="balance">1000</span></strong></p>

<input type="number" id="amount" placeholder="Enter amount">

<br>

<button onclick="setAction('deposit'); deposit()">Deposit</button>
<button onclick="setAction('withdraw'); withdraw()">Withdraw</button>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
